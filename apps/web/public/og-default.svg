<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">pickflow</title>
  <desc id="desc">고민을 투표 링크로 공유하는 pickflow 기본 OG 이미지</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#061411" />
      <stop offset="0.48" stop-color="#0b2520" />
      <stop offset="1" stop-color="#08100f" />
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#12c8a6" />
      <stop offset="0.58" stop-color="#e8c84d" />
      <stop offset="1" stop-color="#ff6b70" />
    </linearGradient>
    <radialGradient id="glow" cx="83%" cy="42%" r="40%">
      <stop offset="0" stop-color="#13c2a3" stop-opacity="0.3" />
      <stop offset="1" stop-color="#13c2a3" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#glow)" />
  <path d="M0 520 C210 450 320 575 500 500 C690 420 785 315 1200 385 L1200 630 L0 630 Z" fill="#0f332c" opacity="0.58" />
  <!-- 큰 아보카도(우측 히어로 비주얼) -->
  <g transform="translate(1000 300)">
    <ellipse cx="0" cy="0" rx="150" ry="190" fill="#7cb342" />
    <ellipse cx="0" cy="0" rx="150" ry="190" fill="none" stroke="#9ccc65" stroke-width="7" />
    <ellipse cx="0" cy="0" rx="106" ry="140" fill="#eef7d6" />
    <circle cx="0" cy="30" r="64" fill="#b08968" />
    <circle cx="0" cy="30" r="64" fill="none" stroke="#8d6e63" stroke-width="6" />
    <ellipse cx="-40" cy="-72" rx="24" ry="36" fill="#ffffff" opacity="0.22" />
  </g>
  <!-- 좌상단 아보카도 배지 -->
  <rect x="96" y="96" width="140" height="140" rx="34" fill="#0e2a25" stroke="#275a4f" stroke-width="2" />
  <g transform="translate(166 168)">
    <ellipse cx="0" cy="0" rx="40" ry="50" fill="#7cb342" />
    <ellipse cx="0" cy="0" rx="40" ry="50" fill="none" stroke="#9ccc65" stroke-width="3" />
    <ellipse cx="0" cy="0" rx="28" ry="37" fill="#eef7d6" />
    <circle cx="0" cy="9" r="17" fill="#b08968" />
  </g>
  <text x="92" y="395" fill="#f4fffc" font-family="Arial, sans-serif" font-size="82" font-weight="800">pickflow</text>
  <text x="96" y="458" fill="#b8d6cf" font-family="Arial, sans-serif" font-size="34" font-weight="600">까다로운 고민, 투표 링크로 친구들에게 빠르게</text>
  <rect x="96" y="504" width="430" height="12" rx="6" fill="url(#accent)" />
  <text x="96" y="562" fill="#7ca59b" font-family="Arial, sans-serif" font-size="24">POLL · SHARE · DECIDE</text>
</svg>
