  - '@apps-in-toss/framework@2.9.1'
  - '@apps-in-toss/native-modules@2.9.1'
  - '@apps-in-toss/plugin-compat@2.9.1'
  - '@apps-in-toss/plugins@2.9.1'
  - '@apps-in-toss/types@2.9.1'
  - '@apps-in-toss/user-scripts@2.9.1'
  - '@apps-in-toss/web-analytics@2.9.1'
  - '@apps-in-toss/web-bridge@2.9.1'
  - '@apps-in-toss/web-config@2.9.1'
  - '@apps-in-toss/web-framework@2.9.1'
  - '@heejun/platform-bridge@0.1.0'
