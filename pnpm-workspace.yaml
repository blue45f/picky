packages:
  - 'apps/*'
  - 'packages/*'
allowBuilds:
  '@nestjs/core': true
  '@prisma/engines': true
  '@sentry/cli': true
  '@swc/core': true
  argon2: true
  esbuild: true
  prisma: true
